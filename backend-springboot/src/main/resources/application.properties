spring.application.name=engine
# Load environment values whether app is launched from project root or backend folder
spring.config.import=optional:file:.env[.properties],optional:file:backend-springboot/.env[.properties]
# Disable default generated Spring Security user; JWT auth is configured explicitly
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Server Port
server.port=${PORT:8080}

# ===============================
# Supabase PostgreSQL Connection
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Keep local connection footprint small for Supabase session pool
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ===============================
# JPA / Hibernate Configuration
# ===============================
# 'update' automatically creates tables in Supabase based on your Java code
spring.jpa.hibernate.ddl-auto=update
# Shows the exact SQL queries in your console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Spring AI (Local Ollama)
# ===============================
# Spring AI 1.0.0-M1 pulls Spring Cloud Function; disable package scanning to avoid boot-time scan condition crash
spring.cloud.function.scan.enabled=false
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:tinyllama}
# A low temperature forces the AI to be analytical rather than creative
spring.ai.ollama.chat.options.temperature=0.3
# Per-edge risk call timeout guard to avoid long frontend waits
engine.ai.risk.timeout-ms=700

# ===============================
# Google Maps Traffic Integration
# ===============================
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
google.maps.timeout-ms=1200
google.maps.cache-ttl-ms=180000

# ===============================
# Basic JWT Security
# ===============================
engine.security.user.username=${APP_AUTH_USERNAME:admin}
engine.security.user.password=${APP_AUTH_PASSWORD:admin123}
engine.security.user.role=${APP_AUTH_ROLE:ADMIN}
engine.security.jwt.secret=${JWT_SECRET:qcomm-engine-jwt-secret-key-at-least-32-bytes}
engine.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:36000}

# ===============================
# Alerting (standby mode)
# ===============================
engine.alerts.enabled=false
